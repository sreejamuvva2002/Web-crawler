  - '"{company}" "Georgia" "EV"'
  - '"{company}" "Georgia" "battery"'
  - '"{company}" "Hyundai Metaplant"'
  - '"{company}" "Georgia" "supplier"'
  - '"{company}" "press release" "Georgia"'

# Follow-up templates used by Stage 3 expansion for newly discovered entities.
followup_company_templates:
  - '"{company}" "Georgia"'
  - '"{company}" "Georgia" "EV"'
  - '"{company}" "Georgia" "battery"'
  - '"{company}" "supplier" "Georgia"'
