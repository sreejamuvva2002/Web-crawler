# Query templates for Stage 1 discovery. {company} / {location} / {domain} placeholders
# are expanded against the seed CSVs by src/discovery/generate_queries.py.

general_queries:
  - '"Georgia" "electric vehicle" "supplier"'
  - '"Georgia" "EV supplier"'
  - '"Georgia" "battery manufacturer"'
  - '"Georgia" "battery materials"'
  - '"Georgia" "electric vehicle manufacturing"'
  - '"Georgia" "automotive supplier" "EV"'
  - '"Georgia" "Hyundai Metaplant" "supplier"'
  - '"Georgia" "Rivian" "supplier"'
  - '"Georgia" "Kia" "electric vehicle"'
  - '"Georgia" "EV battery" "jobs"'
  - '"Georgia" "EV battery" "investment"'
  - '"Georgia" "charging infrastructure" "company"'
  - '"Georgia" "electric mobility" "supplier"'
  - '"Georgia" "battery recycling" "company"'
  - '"Georgia" "cathode" "battery"'
  - '"Georgia" "anode" "battery"'
  - '"Georgia" "electrolyte" "battery"'
  - '"Georgia" "copper foil" "battery"'

site_query_terms:
  # expanded as: site:{domain} <term>  for each seed domain marked use_site_queries
  - '"electric vehicle"'
  - '"battery"'
  - '"Hyundai Metaplant"'
  - '"supplier"'
  - '"electric mobility"'
  - '"EV"'
  - '"jobs" "battery"'

location_query_templates:
